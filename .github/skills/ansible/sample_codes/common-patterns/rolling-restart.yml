---
# Rolling restart of Kafka brokers with health checks
# Restarts one broker at a time, waiting for ISR recovery between restarts
- name: Rolling restart of Kafka brokers
  hosts: kafka_brokers
  become: true
  serial: 1
  vars:
    kafka_port: 9092
    isr_check_retries: 30
    isr_check_delay: 10

  tasks:
    - name: Drain broker connections gracefully
      ansible.builtin.command:
        cmd: >-
          kafka-configs --bootstrap-server localhost:{{ kafka_port }}
          --entity-type brokers --entity-name {{ broker_id }}
          --alter --add-config controlled.shutdown.enable=true
      changed_when: true

    - name: Stop Kafka broker service
      ansible.builtin.service:
        name: confluent-kafka
        state: stopped

    - name: Start Kafka broker service
      ansible.builtin.service:
        name: confluent-kafka
        state: started

    - name: Wait for broker to become available
      ansible.builtin.wait_for:
        port: '{{ kafka_port }}'
        host: '{{ inventory_hostname }}'
        delay: 5
        timeout: 120

    - name: Wait for ISR recovery before proceeding to next broker
      ansible.builtin.command:
        cmd: >-
          kafka-metadata --snapshot /var/kafka-logs/__cluster_metadata-0/00000000000000000000.log
          --cluster-id {{ cluster_id }}
      register: isr_status
      until: "'UnderReplicatedPartitions: 0' in isr_status.stdout"
      retries: '{{ isr_check_retries }}'
      delay: '{{ isr_check_delay }}'
      changed_when: false
