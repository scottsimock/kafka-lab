---
# Main orchestration playbook for Kafka lab environment
# Configures base OS, installs Java, and prepares VMs for Kafka components
- name: Configure base OS on all Kafka nodes
  hosts: kafka_brokers:zookeeper
  become: true
  vars:
    admin_username: 'azureuser'
    java_version: '17'
    kafka_data_dirs:
      - '/data/kafka/logs'
      - '/data/kafka/data'

  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command:
        cmd: cloud-init status --wait
      changed_when: false

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - unzip
          - jq
          - net-tools
          - htop
          - dnsutils
          - "openjdk-{{ java_version }}-jdk-headless"
        state: present

    - name: Set JAVA_HOME in environment
      ansible.builtin.lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: "JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64"
        state: present

    - name: Create kafka system user
      ansible.builtin.user:
        name: kafka
        system: true
        shell: /usr/sbin/nologin
        home: /opt/kafka
        create_home: false
        state: present

    - name: Create Kafka data directories
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        owner: kafka
        group: kafka
        mode: '0750'
      loop: '{{ kafka_data_dirs }}'

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: 'sshd -t -f %s'
      notify: Restart sshd

    - name: Configure system limits for Kafka
      ansible.builtin.copy:
        dest: /etc/security/limits.d/kafka.conf
        content: |
          kafka soft nofile 128000
          kafka hard nofile 128000
          kafka soft nproc 65536
          kafka hard nproc 65536
        mode: '0644'

    - name: Configure sysctl for Kafka networking
      ansible.posix.sysctl:
        name: '{{ item.key }}'
        value: '{{ item.value }}'
        sysctl_set: true
        reload: true
        state: present
      loop:
        - { key: 'net.core.wmem_max', value: '2097152' }
        - { key: 'net.core.rmem_max', value: '2097152' }
        - { key: 'vm.swappiness', value: '1' }
        - { key: 'vm.dirty_ratio', value: '80' }
        - { key: 'vm.dirty_background_ratio', value: '5' }

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
