# Confluent Kafka Broker Configuration
# server.properties for a multi-AZ production deployment

# =====================================================
# Broker Identity
# =====================================================
broker.id=1
# Each broker must have a unique integer ID

# =====================================================
# Listeners
# =====================================================
listeners=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
advertised.listeners=INTERNAL://broker-1.kafka.internal:9092,EXTERNAL://broker-1.kafka.external:9093
listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:SSL
inter.broker.listener.name=INTERNAL

# =====================================================
# SSL Configuration (for EXTERNAL listener)
# =====================================================
ssl.keystore.location=/etc/kafka/ssl/kafka.broker.keystore.jks
ssl.keystore.password=${KEYSTORE_PASSWORD}
ssl.key.password=${KEY_PASSWORD}
ssl.truststore.location=/etc/kafka/ssl/kafka.broker.truststore.jks
ssl.truststore.password=${TRUSTSTORE_PASSWORD}
ssl.client.auth=required
ssl.enabled.protocols=TLSv1.3,TLSv1.2

# =====================================================
# ZooKeeper
# =====================================================
zookeeper.connect=zk-1.kafka.internal:2181,zk-2.kafka.internal:2181,zk-3.kafka.internal:2181/kafka
zookeeper.connection.timeout.ms=18000
zookeeper.session.timeout.ms=18000

# =====================================================
# Log (Message Storage)
# =====================================================
log.dirs=/data/kafka/data
log.retention.hours=168
log.retention.bytes=-1
log.segment.bytes=1073741824
log.cleanup.policy=delete

# =====================================================
# Replication
# =====================================================
default.replication.factor=3
min.insync.replicas=2
unclean.leader.election.enable=false

# =====================================================
# Topics
# =====================================================
num.partitions=6
auto.create.topics.enable=false

# =====================================================
# Networking
# =====================================================
num.network.threads=8
num.io.threads=16
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# =====================================================
# Replication Performance
# =====================================================
num.replica.fetchers=4
replica.fetch.max.bytes=10485760
replica.fetch.wait.max.ms=500

# =====================================================
# Schema Validation
# =====================================================
confluent.schema.registry.url=http://schema-registry-1.kafka.internal:8081,http://schema-registry-2.kafka.internal:8081

# =====================================================
# Metrics
# =====================================================
metric.reporters=io.confluent.metrics.reporter.ConfluentMetricsReporter
confluent.metrics.reporter.bootstrap.servers=broker-1.kafka.internal:9092,broker-2.kafka.internal:9092,broker-3.kafka.internal:9092
confluent.metrics.reporter.topic.replicas=3
