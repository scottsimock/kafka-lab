# Terraform Drift Detection
# Runs on a schedule to detect out-of-band changes to infrastructure

name: 'Terraform Drift Detection'

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays at 6:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: '1.9.0'
  TF_WORKING_DIR: 'terraform'
  ARM_USE_OIDC: 'true'

jobs:
  drift-detection:
    name: 'Detect Infrastructure Drift'
    runs-on: ubuntu-latest
    environment: planning
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan (drift check)
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -detailed-exitcode -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Create Issue on Drift
        if: steps.plan.outputs.exitcode == 2
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(
              '${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8'
            );
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Infrastructure Drift Detected',
              body: `## Drift Detection Report\n\nTerraform detected changes between the state and actual infrastructure.\n\n<details>\n<summary>Plan Output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>\n\nPlease review and reconcile the drift.`,
              labels: ['infrastructure', 'drift']
            });
