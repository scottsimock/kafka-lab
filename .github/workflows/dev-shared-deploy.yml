# Dev Shared Infrastructure Deployment
#
# Deploys long-lived resources (UAMI, Key Vault) that persist across
# dev-teardown and dev-recreate cycles. Run once before the first dev
# environment deployment, or when shared resource config changes.
#
# Usage: Actions → Dev Shared Deploy → Run workflow

name: Dev Shared Deploy

on:
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Plan only — do not apply'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-dev-shared
  cancel-in-progress: false

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  TF_IN_AUTOMATION: "true"
  WORKING_DIR: terraform/environments/dev-shared

jobs:
  deploy:
    name: Deploy Shared Resources
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIR }}/.terraform/providers
          key: terraform-providers-shared-${{ hashFiles(format('{0}/.terraform.lock.hcl', env.WORKING_DIR)) }}
          restore-keys: |
            terraform-providers-shared-

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=kafka-lab/dev-shared.tfstate"

      - name: Terraform Plan
        run: |
          terraform plan -no-color -input=false -out=tfplan \
            -var-file="terraform.dev-shared.tfvars" \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            | tee plan-output.txt

      - name: Upload Plan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-shared
          path: |
            ${{ env.WORKING_DIR }}/plan-output.txt
          retention-days: 7

      - name: Terraform Apply
        if: inputs.plan_only == false
        run: terraform apply -no-color -input=false tfplan

      - name: Summary
        if: inputs.plan_only == false
        run: |
          echo "## Dev Shared Infrastructure Deployed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Persistent resources deployed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ UAMI: \`klc-id-kafkalab-scus\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Key Vault: \`klc-kv-kafkalab-scus\` (with CMEK key)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "These resources persist across dev-teardown / dev-recreate cycles." >> "$GITHUB_STEP_SUMMARY"
