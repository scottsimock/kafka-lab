# Nightly Terraform Drift Detection
#
# Runs `terraform plan -detailed-exitcode` against each environment and opens
# a GitHub issue when the real infrastructure differs from the stored state.
# This workflow NEVER applies changes — it is observe-only.

name: Drift Detection

on:
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC
  workflow_dispatch: # allow manual runs

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  TF_IN_AUTOMATION: "true"

jobs:
  detect-drift:
    name: Detect Drift — dev
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
      issues: write
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/environments/dev/.terraform/providers
          key: terraform-providers-${{ hashFiles('terraform/environments/dev/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=kafka-lab/dev.tfstate"

      - name: Terraform Plan (detect drift)
        id: plan
        continue-on-error: true
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -input=false -out=tfplan 2>&1 | tee drift-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue on drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('terraform/environments/dev/drift-output.txt', 'utf8');
            const truncated = output.length > 10000
              ? output.substring(0, 10000) + '\n\n… (truncated)'
              : output;
            const date = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Terraform drift detected — ${date}`,
              body: [
                '## Terraform Drift Report',
                '',
                `**Environment:** dev`,
                `**Directory:** \`terraform/environments/dev\``,
                `**Detected:** ${new Date().toISOString()}`,
                '',
                '### Plan Output',
                '',
                '```',
                truncated,
                '```',
                '',
                '> This issue was created automatically by the [Drift Detection workflow]' +
                `(${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
                '> Review the plan output and apply changes manually if appropriate.',
              ].join('\n'),
              labels: ['drift', 'infrastructure'],
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan failed — see drift-output.txt"
          exit 1
