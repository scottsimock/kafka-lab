# PR Validation Workflow
#
# Runs on pull requests targeting main to validate Terraform configuration,
# build the Next.js webapp, and syntax-check Ansible playbooks.  All three
# jobs run in parallel for fast feedback.

name: PR Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  TF_IN_AUTOMATION: "true"

jobs:
  # ── Terraform Validate & Plan ────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/environments/dev/.terraform/providers
          key: terraform-providers-${{ hashFiles('terraform/environments/dev/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=kafka-lab/dev.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: |
          terraform plan -no-color -input=false -out=tfplan \
            | tee plan-output.txt

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/dev/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n...[truncated]'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Next.js Build ────────────────────────────────────────────────────
  webapp-build:
    name: Webapp Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        env:
          NODE_ENV: production
        run: npm run build

      - name: Lint
        run: npm run lint

  # ── Ansible Syntax Check ─────────────────────────────────────────────
  ansible-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet ansible

      - name: Syntax-check site.yml
        run: ansible-playbook --syntax-check ansible/site.yml

      - name: Syntax-check playbooks
        run: |
          for playbook in ansible/playbooks/*.yml; do
            echo "Checking $playbook"
            ansible-playbook --syntax-check "$playbook"
          done
