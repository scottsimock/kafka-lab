# Dev environment static inventory
# Generated from known Terraform IP allocations for southcentralus Zone 1.
# Use this when Azure RM dynamic inventory is unavailable (local dev, CI).

[zookeeper]
zk-01 ansible_host=10.1.2.4
zk-02 ansible_host=10.1.2.5
zk-03 ansible_host=10.1.2.6

[kafka_broker]
kb-01 ansible_host=10.1.1.4
kb-02 ansible_host=10.1.1.5
kb-03 ansible_host=10.1.1.6

[schema_registry]
sr-01 ansible_host=10.1.3.4

[kafka_connect]
kc-01 ansible_host=10.1.4.4

[env_dev:children]
zookeeper
kafka_broker
schema_registry
kafka_connect

[southcentralus:children]
zookeeper
kafka_broker
schema_registry
kafka_connect

[all:vars]
ansible_user=azureuser
ansible_python_interpreter=/usr/bin/python3
