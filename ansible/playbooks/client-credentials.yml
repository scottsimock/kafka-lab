---
# client-credentials.yml — Create and distribute Kafka client SCRAM credentials
# Run after kafka-broker play has completed and SASL_SSL is enabled.
# Targets: kafka_broker[0] for SCRAM bootstrap, all brokers for client.properties distribution

- name: Create Kafka client SCRAM credentials and deploy client.properties
  hosts: kafka_broker
  gather_facts: true
  any_errors_fatal: true
  serial: 1
  roles:
    - kafka-client-creds
