---
# ACL configuration tasks — runs on a single broker (run_once: true)
# kafka-acls --add is idempotent and safe to re-run.
# Requires: AclAuthorizer configured (from server.properties), admin.properties for SASL_SSL auth.

# =====================================================
# web-app ACLs — read/write on kafkalab.* topics, read on webapp-* groups
# =====================================================
- name: Grant web-app write and describe access to application topics
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:web-app
      --operation Write --operation Describe
      --topic kafkalab.
      --resource-pattern-type prefixed
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant web-app read and describe access to application topics
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:web-app
      --operation Read --operation Describe
      --topic kafkalab.
      --resource-pattern-type prefixed
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant web-app read access to webapp- consumer groups
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:web-app
      --operation Read
      --group webapp-
      --resource-pattern-type prefixed
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

# =====================================================
# schema-registry ACLs — full access to _schemas topic
# =====================================================
- name: Grant schema-registry full access to _schemas topic
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:schema-registry
      --operation Read --operation Write --operation Create --operation Describe --operation DescribeConfigs
      --topic _schemas
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant schema-registry read access to schema-registry consumer group
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:schema-registry
      --operation Read
      --group schema-registry
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

# =====================================================
# connect-worker ACLs — connect-* topics, connect-* groups, cluster describe
# =====================================================
- name: Grant connect-worker access to connect-* internal topics
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:connect-worker
      --operation Read --operation Write --operation Create --operation Describe
      --topic connect-
      --resource-pattern-type prefixed
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant connect-worker read access to connect-* consumer groups
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:connect-worker
      --operation Read
      --group connect-
      --resource-pattern-type prefixed
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant connect-worker describe access on cluster
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:connect-worker
      --operation Describe
      --cluster
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

# =====================================================
# admin ACLs — cluster-wide access (already super.user, explicit for completeness)
# =====================================================
- name: Grant admin all operations on cluster
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:admin
      --operation All
      --cluster
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant admin all operations on all topics
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:admin
      --operation All
      --topic '*'
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

- name: Grant admin all operations on all consumer groups
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --add --allow-principal User:admin
      --operation All
      --group '*'
  run_once: true
  become: true
  become_user: '{{ kafka_user }}'
  changed_when: true

# =====================================================
# Verification
# =====================================================
- name: List all ACLs for verification
  ansible.builtin.command:
    cmd: >-
      {{ kafka_broker_bin_dir }}/kafka-acls
      --bootstrap-server {{ kafka_broker_acl_bootstrap_server }}
      --command-config {{ kafka_broker_acl_admin_config }}
      --list
  register: acl_list
  run_once: true
  changed_when: false
  become: true
  become_user: '{{ kafka_user }}'

- name: Assert web-app ACLs are present
  ansible.builtin.assert:
    that: "'User:web-app' in acl_list.stdout"
    fail_msg: 'web-app ACLs not found in kafka-acls --list output'
  run_once: true

- name: Assert schema-registry ACLs are present
  ansible.builtin.assert:
    that: "'User:schema-registry' in acl_list.stdout"
    fail_msg: 'schema-registry ACLs not found in kafka-acls --list output'
  run_once: true

- name: Assert connect-worker ACLs are present
  ansible.builtin.assert:
    that: "'User:connect-worker' in acl_list.stdout"
    fail_msg: 'connect-worker ACLs not found in kafka-acls --list output'
  run_once: true
